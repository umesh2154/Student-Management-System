<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Student</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow">
          <div class="card-body">
            <h3 class="card-title text-center mb-3">Edit Student</h3>
            <form method="POST">
              <div class="mb-3">
                <label>Name</label>
                <input type="text" name="name" value="{{ student.name }}" class="form-control" required>
              </div>
              <div class="mb-3">
                <label>Department</label>
                <input type="text" name="department" value="{{ student.department }}" class="form-control" required>
              </div>
              <div class="mb-3">
                <label>Roll</label>
                <input type="text" name="roll" value="{{ student.roll }}" class="form-control" required>
              </div>
              <div class="mb-3">
                <label>Course</label>
                <input type="text" name="course" value="{{ student.course }}" class="form-control" required>
              </div>
              <button type="submit" class="btn btn-primary w-100">Update</button>
            </form>
            <a href="{{ url_for('students') }}" class="btn btn-secondary w-100 mt-2">Back to List</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
