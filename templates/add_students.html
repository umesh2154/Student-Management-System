<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Student</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
    }
    .form-card {
      background: white;
      border-radius: 15px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .form-control:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }
    .btn-custom {
      border-radius: 25px;
      padding: 10px 30px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="form-card">
          <h3 class="text-center mb-4">
            <i class="fas fa-user-plus text-success"></i> Add New Student
          </h3>
          <form method="POST">
            <div class="mb-3">
              <label class="form-label"><i class="fas fa-user"></i> Name</label>
              <input type="text" name="name" class="form-control" placeholder="Enter student name" required>
            </div>
            <div class="mb-3">
              <label class="form-label"><i class="fas fa-building"></i> Department</label>
              <input type="text" name="department" class="form-control" placeholder="Enter department" required>
            </div>
            <div class="mb-3">
              <label class="form-label"><i class="fas fa-id-badge"></i> Roll Number</label>
              <input type="text" name="roll" class="form-control" placeholder="Enter roll number" required>
            </div>
            <div class="mb-3">
              <label class="form-label"><i class="fas fa-book"></i> Course</label>
              <input type="text" name="course" class="form-control" placeholder="Enter course" required>
            </div>
            <button type="submit" class="btn btn-success w-100 btn-custom">
              <i class="fas fa-save"></i> Save Student
            </button>
          </form>
          <a href="{{ url_for('students') }}" class="btn btn-secondary w-100 mt-3 btn-custom">
            <i class="fas fa-arrow-left"></i> Back to List
          </a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
