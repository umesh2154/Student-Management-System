<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Student Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
    }
    .register-card {
      background: white;
      border-radius: 15px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .form-control:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }
    .btn-custom {
      border-radius: 25px;
      padding: 10px 30px;
      font-weight: 600;
    }
    .register-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .register-header i {
      font-size: 4rem;
      color: #28a745;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="register-card">
          <div class="register-header">
            <i class="fas fa-user-plus"></i>
            <h3 class="mt-3">Create Your Account</h3>
            <p class="text-muted">Join Student Management System</p>
          </div>
          
          {% if error %}
            <div class="alert alert-danger">
              <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
          {% endif %}

          <form method="POST">
            <div class="mb-3">
              <label class="form-label"><i class="fas fa-id-card"></i> Student ID</label>
              <input type="text" name="student_id" class="form-control" placeholder="Enter your student ID" required>
            </div>
            <div class="mb-3">
              <label class="form-label"><i class="fas fa-user"></i> Username</label>
              <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
            <div class="mb-3">
              <label class="form-label"><i class="fas fa-building"></i> Faculty</label>
              <input type="text" name="faculty" class="form-control" placeholder="Enter your faculty" required>
            </div>
            <div class="mb-3">
              <label class="form-label"><i class="fas fa-lock"></i> Password</label>
              <input type="password" name="password" class="form-control" placeholder="Enter a secure password" required>
            </div>
            <button type="submit" class="btn btn-success w-100 btn-custom">
              <i class="fas fa-user-check"></i> Register
            </button>
          </form>

          <div class="mt-4 text-center">
            <p>Already have an account? 
              <a href="{{ url_for('login') }}" class="fw-bold text-decoration-none">Login here</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
